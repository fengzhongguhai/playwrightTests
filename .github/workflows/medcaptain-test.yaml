name: MedCaptain 每日定时测试

on:
  workflow_dispatch:   # 先只用手动触发，方便调试
  # schedule:
  #   - cron: '0 1 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装项目依赖
        run: npm ci

      - name: 检查测试文件是否存在
        run: ls -la tests/

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps

      - name: 运行测试（详细输出）
        run: npx playwright test tests/medcaptain.spec.ts --reporter=list
