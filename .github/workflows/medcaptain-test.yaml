name: MedCaptain 每日定时测试

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 9:00

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 增加超时时间

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装项目依赖
        run: npm ci

      - name: 缓存 Playwright 浏览器（加速后续运行）
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps

      - name: 运行测试（详细输出 + 生成报告）
        run: npx playwright test tests/medcaptain.spec.ts --reporter=html,list

      - name: 上传测试报告（成功失败都保留）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
