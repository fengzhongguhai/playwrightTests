name: MedCaptain 每日定时测试

on:
  # 手动触发（方便你随时测试）
  workflow_dispatch:

  # 定时触发：每天北京时间早上 9:00 执行
  schedule:
    - cron: '0 1 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps

      - name: 只运行 MedCaptain 测试脚本
        run: npx playwright test tests/medcaptain.spec.ts

      - name: 上传测试报告（失败也保留）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
